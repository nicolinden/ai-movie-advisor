services:
  ai-movie-advisor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-movie-advisor
    ports:
      - "8086:3000"
    environment:
      - NODE_ENV=production
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3000
    restart: unless-stopped
