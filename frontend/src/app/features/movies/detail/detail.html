@if (isLoading()) {
  <p class="text-slate-300">Loading movie...</p>
} @else if (errorMessage()) {
  <div class="space-y-4">
    <a class="text-blue-400 hover:text-blue-300" routerLink="/">← Back to search</a>

    <p class="rounded-xl border border-red-900/60 bg-red-950/50 px-4 py-3 text-red-300">
      {{ errorMessage() }}
    </p>
  </div>
} @else if (movie(); as movieDetail) {
  <section class="space-y-8">
    <a class="inline-flex text-blue-400 hover:text-blue-300" routerLink="/"> ← Back to search </a>

    <app-movie-hero [movie]="movieDetail" />

    <div class="lg:ml-[252px] space-y-3">
      <button
        class="rounded-xl bg-blue-600 px-5 py-3 font-medium text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-60"
        type="button"
        (click)="analyzeMovie()"
        [disabled]="isAnalyzing()"
      >
        {{ isAnalyzing() ? 'Analyzing...' : 'Analyze with AI' }}
      </button>

      @if (analysisError()) {
        <p
          class="max-w-3xl rounded-xl border border-red-900/60 bg-red-950/50 px-4 py-3 text-red-300"
        >
          {{ analysisError() }}
        </p>
      }
    </div>

    @if (analysis(); as movieAnalysis) {
      <app-ai-analysis-card [analysis]="movieAnalysis" />
    }
  </section>
}
