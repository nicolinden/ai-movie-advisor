@if (movie().backdropUrl) {
  <img
    class="h-72 w-full rounded-3xl object-cover shadow-2xl shadow-black/40"
    [src]="movie().backdropUrl"
    [alt]="movie().title"
  />
}

<div class="mt-8 grid gap-8 lg:grid-cols-[220px_1fr]">
  @if (movie().posterUrl) {
    <img
      class="w-56 rounded-2xl object-cover shadow-xl shadow-black/40"
      [src]="movie().posterUrl"
      [alt]="movie().title"
    />
  }

  <div class="space-y-5">
    <div>
      <h1 class="text-4xl font-bold tracking-tight text-white md:text-5xl">
        {{ movie().title }}
      </h1>

      <p class="mt-3 text-slate-400">
        {{ movie().releaseDate }} · {{ movie().runtime }} min · ⭐ {{ movie().rating }}
      </p>
    </div>

    <div class="flex flex-wrap gap-2">
      @for (genre of movie().genres; track genre) {
        <span
          class="rounded-full bg-blue-500/10 px-3 py-1 text-sm font-medium text-blue-300 ring-1 ring-blue-500/20"
        >
          {{ genre }}
        </span>
      }
    </div>

    <p class="max-w-3xl text-lg leading-8 text-slate-300">
      {{ movie().overview }}
    </p>
  </div>
</div>
