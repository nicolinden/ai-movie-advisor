<section class="space-y-8">
  <header class="space-y-3">
    <p class="text-sm font-medium uppercase tracking-widest text-blue-400">AI Movie Advisor</p>

    <h1 class="max-w-3xl text-4xl font-bold tracking-tight text-white md:text-5xl">
      Find your next movie with AI.
    </h1>

    <p class="max-w-2xl text-slate-400">
      Search for a movie, open the details and let AI explain whether it fits your taste.
    </p>
  </header>

  <div
    class="flex max-w-2xl flex-col gap-3 rounded-2xl border border-slate-800 bg-slate-900/70 p-4 shadow-xl shadow-black/20 sm:flex-row"
  >
    <input
      class="min-w-0 flex-1 rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30"
      type="text"
      placeholder="Search for a movie..."
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
      (keydown.enter)="searchMovies()"
    />

    <button
      class="rounded-xl bg-blue-600 px-5 py-3 font-medium text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-60"
      type="button"
      (click)="searchMovies()"
      [disabled]="isLoading()"
    >
      {{ isLoading() ? 'Searching...' : 'Search' }}
    </button>
  </div>

  @if (errorMessage()) {
    <p class="rounded-xl border border-red-900/60 bg-red-950/50 px-4 py-3 text-red-300">
      {{ errorMessage() }}
    </p>
  }

  @if (movies().length > 0) {
    <ul class="grid gap-4">
      @for (movie of movies(); track movie.id) {
        <li><app-movie-card [movie]="movie" /></li>
      }
    </ul>
  }
</section>
